name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK
        run: gradle assembleDebug 2>&1 | tee /tmp/build.log || true

      - name: Print errors
        run: grep -n "error:\|^e:\|Exception\|FAILED\|Cannot\|Unresolved" /tmp/build.log | grep -v "debugRuntimeClasspath" | head -50

      - name: Fail if no APK
        run: test -f app/build/outputs/apk/debug/app-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: ATDialer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
